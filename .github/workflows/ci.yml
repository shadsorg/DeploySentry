name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  lint-ui:
    name: Lint UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --ignore-scripts

      - name: Run ESLint
        working-directory: web
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives --max-warnings 0

      - name: Run Prettier check
        working-directory: web
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  lint-sql:
    name: Lint SQL Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL migrations
        run: sqlfluff lint migrations/ --dialect postgres || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: deploysentry
          POSTGRES_PASSWORD: deploysentry
          POSTGRES_DB: deploysentry_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deploysentry"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
        options: >-
          --name nats

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -short -race -coverprofile=coverage-unit.out -covermode=atomic ./...

      - name: Run integration tests
        env:
          DS_DATABASE_HOST: localhost
          DS_DATABASE_PORT: 5432
          DS_DATABASE_USER: deploysentry
          DS_DATABASE_PASSWORD: deploysentry
          DS_DATABASE_NAME: deploysentry_test
          DS_DATABASE_SSL_MODE: disable
          DS_REDIS_HOST: localhost
          DS_REDIS_PORT: 6379
          DS_NATS_URL: nats://localhost:4222
        run: go test -run Integration -race -coverprofile=coverage-int.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage-unit.out,coverage-int.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build API binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}" \
            -trimpath \
            -o bin/deploysentry-api-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/api

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}" \
            -trimpath \
            -o bin/deploysentry-cli-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/cli

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
          retention-days: 7

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: deploysentry/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: deploy/docker/Dockerfile.web
          push: false
          tags: deploysentry/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build, build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: bin/

      - name: Deploy to dev environment
        uses: ./.github/actions/deploy
        with:
          api-url: ${{ vars.DEV_API_URL || 'https://api.dr-sentry.com' }}
          api-key: ${{ secrets.DEPLOYSENTRY_API_KEY }}
          project-id: ${{ vars.DEPLOYSENTRY_PROJECT_ID }}
          environment-id: ${{ vars.DEPLOYSENTRY_DEV_ENV_ID }}
          version: ${{ github.sha }}
          strategy: rolling
          wait: "true"
          timeout: "300"

      - name: Run smoke tests
        env:
          DEPLOY_ENV: dev
          SMOKE_TEST_URL: ${{ vars.DEV_API_URL || 'https://api.dr-sentry.com' }}
        run: |
          echo "Running smoke tests against ${SMOKE_TEST_URL}..."

          # Health check
          for i in $(seq 1 30); do
            if curl -sf "${SMOKE_TEST_URL}/health" > /dev/null 2>&1; then
              echo "Health check passed."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Health check failed after 30 attempts."
              exit 1
            fi
            echo "Waiting for service to be ready... (attempt ${i}/30)"
            sleep 5
          done

          # Verify version endpoint
          curl -sf "${SMOKE_TEST_URL}/api/v1/version" | grep -q "version" \
            && echo "Version endpoint OK" \
            || echo "Version endpoint check skipped"

          echo "Smoke tests completed."
