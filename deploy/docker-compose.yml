version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: deploysentry-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: deploysentry
      POSTGRES_PASSWORD: deploysentry
      POSTGRES_DB: deploysentry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploysentry -d deploysentry"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - deploysentry-net

  redis:
    image: redis:7-alpine
    container_name: deploysentry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - deploysentry-net

  nats:
    image: nats:2-alpine
    container_name: deploysentry-nats
    restart: unless-stopped
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: "nats-server --js --sd /data --http_port 8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - deploysentry-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local

networks:
  deploysentry-net:
    name: deploysentry-net
    driver: bridge
