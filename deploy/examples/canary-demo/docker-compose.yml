version: '3.8'

services:
  app-stable:
    build:
      context: ../../../..
      dockerfile: deploy/examples/canary-demo/Dockerfile.demoapp
    environment:
      APP_VERSION: v1.0.0-stable
      PORT: "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  app-canary:
    build:
      context: ../../../..
      dockerfile: deploy/examples/canary-demo/Dockerfile.demoapp
    environment:
      APP_VERSION: v2.0.0-canary
      PORT: "8082"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf.tmpl:/etc/nginx/conf.d/default.conf:ro
      - nginx-conf:/etc/nginx/conf.d/
    depends_on:
      app-stable:
        condition: service_healthy
      app-canary:
        condition: service_healthy

  consumer:
    build:
      context: ../../../..
      dockerfile: deploy/examples/canary-demo/Dockerfile.consumer
    environment:
      DS_API_URL: http://host.docker.internal:8080
      DS_API_KEY: ""
      DS_APP_ID: demo-app
      DS_POLL_INTERVAL: 5s
      DS_NGINX_CONF_PATH: /etc/nginx/conf.d/app.conf
      DS_STABLE_BACKEND: app-stable:8081
      DS_CANARY_BACKEND: app-canary:8082
    depends_on:
      nginx:
        condition: service_started
    volumes:
      - nginx-conf:/etc/nginx/conf.d/

volumes:
  nginx-conf:
