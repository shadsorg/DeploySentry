apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploysentry-api
  labels:
    app.kubernetes.io/name: deploysentry-api
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: deploysentry
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: deploysentry-api
      app.kubernetes.io/component: api-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deploysentry-api
        app.kubernetes.io/component: api-server
        app.kubernetes.io/part-of: deploysentry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: deploysentry-api
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api-server
          image: deploysentry/api-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: log_level
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: database_host
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: database_port
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: database_name
            - name: DATABASE_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: database_sslmode
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: redis_host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: redis_port
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: deploysentry-config
                  key: nats_url
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: deploysentry-secrets
                  key: database_user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: deploysentry-secrets
                  key: database_password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: deploysentry-secrets
                  key: jwt_secret
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: deploysentry-secrets
                  key: oauth_client_secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: deploysentry-secrets
                  key: encryption_key
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
