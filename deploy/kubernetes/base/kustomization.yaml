apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deploysentry

commonLabels:
  app.kubernetes.io/part-of: deploysentry
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml
  - hpa.yaml
  - pdb.yaml

images:
  - name: deploysentry/api-server
    newTag: latest
