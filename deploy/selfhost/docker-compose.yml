# DeploySentry Self-Hosted — All-in-one Docker Compose
#
# Usage:
#   cd deploy/selfhost
#   docker compose up -d
#
# Port mapping:
#   80  → Web dashboard + API (the only port you need to expose)
#
# First run:
#   docker compose up -d postgres redis nats
#   sleep 5
#   docker compose run --rm migrate
#   docker compose up -d

services:
  # -----------------------------------------------------------------------
  # Reverse Proxy + Web Dashboard (port 80)
  # -----------------------------------------------------------------------
  web:
    build:
      context: ../..
      dockerfile: deploy/selfhost/Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Go API Server
  # -----------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: deploy/selfhost/Dockerfile.api
    environment:
      DS_SERVER_HOST: 0.0.0.0
      DS_SERVER_PORT: "8080"
      DS_DATABASE_HOST: postgres
      DS_DATABASE_PORT: "5432"
      DS_DATABASE_USER: deploysentry
      DS_DATABASE_PASSWORD: deploysentry
      DS_DATABASE_NAME: deploysentry
      DS_DATABASE_SSL_MODE: disable
      DS_DATABASE_SCHEMA: deploy
      DS_REDIS_HOST: redis
      DS_REDIS_PORT: "6379"
      DS_NATS_URL: nats://nats:4222
      DS_AUTH_JWT_SECRET: ${JWT_SECRET:-change-me-use-openssl-rand-base64-32}
      DS_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # PostgreSQL
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deploysentry
      POSTGRES_PASSWORD: deploysentry
      POSTGRES_DB: deploysentry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploysentry"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Redis
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # NATS
  # -----------------------------------------------------------------------
  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - natsdata:/data
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Database Migrations (run once)
  # -----------------------------------------------------------------------
  migrate:
    image: migrate/migrate:latest
    volumes:
      - ../../migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://deploysentry:deploysentry@postgres:5432/deploysentry?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - setup

volumes:
  pgdata:
  redisdata:
  natsdata: