# DeploySentry Self-Hosted — All-in-one Docker Compose
#
# Setup:
#   1. Create a Cloudflare Tunnel at https://one.dash.cloudflare.com
#      → Networks → Tunnels → Create → name it "deploysentry"
#      → Copy the tunnel token
#      → Add public hostname: deploysentry.yourdomain.com → http://web:80
#
#   2. Create .env file:
#      echo "JWT_SECRET=$(openssl rand -base64 32)" > .env
#      echo "CLOUDFLARE_TUNNEL_TOKEN=your-token-here" >> .env
#
#   3. Run migrations (one-time):
#      docker compose --profile setup run --rm migrate
#
#   4. Start everything:
#      docker compose up -d
#
# No port forwarding required. Cloudflare Tunnel handles everything.

services:
  # -----------------------------------------------------------------------
  # Cloudflare Tunnel (HTTPS ingress, no ports needed)
  # -----------------------------------------------------------------------
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Reverse Proxy + Web Dashboard
  # -----------------------------------------------------------------------
  web:
    build:
      context: ../..
      dockerfile: deploy/selfhost/Dockerfile.web
    # No ports exposed — tunnel routes traffic in
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Go API Server
  # -----------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: deploy/selfhost/Dockerfile.api
    environment:
      DS_SERVER_HOST: 0.0.0.0
      DS_SERVER_PORT: "8080"
      DS_DATABASE_HOST: postgres
      DS_DATABASE_PORT: "5432"
      DS_DATABASE_USER: deploysentry
      DS_DATABASE_PASSWORD: deploysentry
      DS_DATABASE_NAME: deploysentry
      DS_DATABASE_SSL_MODE: disable
      DS_DATABASE_SCHEMA: deploy
      DS_REDIS_HOST: redis
      DS_REDIS_PORT: "6379"
      DS_NATS_URL: nats://nats:4222
      DS_AUTH_JWT_SECRET: ${JWT_SECRET:-change-me-use-openssl-rand-base64-32}
      DS_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # PostgreSQL
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deploysentry
      POSTGRES_PASSWORD: deploysentry
      POSTGRES_DB: deploysentry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploysentry"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Redis
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # NATS
  # -----------------------------------------------------------------------
  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - natsdata:/data
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Database Migrations (run once)
  # -----------------------------------------------------------------------
  migrate:
    image: migrate/migrate:latest
    volumes:
      - ../../migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://deploysentry:deploysentry@postgres:5432/deploysentry?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - setup

volumes:
  pgdata:
  redisdata:
  natsdata: