name: deploysentry_mobile
description: DeploySentry mobile application for managing deployments and feature flags.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  go_router: ^14.0.0
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.8.1
  intl: ^0.19.0
  fl_chart: ^0.65.0
  connectivity_plus: ^5.0.0
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
