databases:
  - name: deploysentry-db
    plan: starter
    databaseName: deploysentry
    user: deploysentry
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  # -----------------------------------------------------------------------
  # API Server (Go)
  # -----------------------------------------------------------------------
  - type: web
    name: deploysentry-api
    runtime: go
    plan: starter
    repo: https://github.com/shadsorg/DeploySentry.git
    branch: main
    buildCommand: go build -ldflags "-s -w" -o bin/api ./cmd/api
    startCommand: bin/api
    healthCheckPath: /health
    envVars:
      - key: DS_SERVER_HOST
        value: 0.0.0.0
      - key: DS_SERVER_PORT
        value: "8080"
      - key: DS_DATABASE_HOST
        fromDatabase:
          name: deploysentry-db
          property: host
      - key: DS_DATABASE_PORT
        fromDatabase:
          name: deploysentry-db
          property: port
      - key: DS_DATABASE_USER
        fromDatabase:
          name: deploysentry-db
          property: user
      - key: DS_DATABASE_PASSWORD
        fromDatabase:
          name: deploysentry-db
          property: password
      - key: DS_DATABASE_NAME
        fromDatabase:
          name: deploysentry-db
          property: database
      - key: DS_DATABASE_SSL_MODE
        value: require
      - key: DS_DATABASE_SCHEMA
        value: deploy
      - key: DS_REDIS_HOST
        fromService:
          name: deploysentry-redis
          type: redis
          property: host
      - key: DS_REDIS_PORT
        fromService:
          name: deploysentry-redis
          type: redis
          property: port
      - key: DS_NATS_URL
        fromService:
          name: deploysentry-nats
          type: pserv
          envVarKey: NATS_URL
      - key: DS_AUTH_JWT_SECRET
        generateValue: true
      - key: DS_LOG_LEVEL
        value: info
      - key: DS_ENVIRONMENT
        value: production

  # -----------------------------------------------------------------------
  # Web Dashboard (React Static Site)
  # -----------------------------------------------------------------------
  - type: web
    name: deploysentry-web
    runtime: static
    plan: starter
    repo: https://github.com/shadsorg/DeploySentry.git
    branch: main
    buildCommand: cd web && npm ci && npm run build
    staticPublishPath: web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: deploysentry-api
          type: web
          property: url

  # -----------------------------------------------------------------------
  # NATS (Background Worker)
  # -----------------------------------------------------------------------
  - type: pserv
    name: deploysentry-nats
    runtime: docker
    plan: starter
    repo: https://github.com/shadsorg/DeploySentry.git
    branch: main
    dockerfilePath: deploy/nats/Dockerfile
    disk:
      name: nats-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NATS_URL
        value: nats://localhost:4222

  # -----------------------------------------------------------------------
  # Database Migrations (Run Once)
  # -----------------------------------------------------------------------
  - type: job
    name: deploysentry-migrate
    runtime: docker
    plan: starter
    repo: https://github.com/shadsorg/DeploySentry.git
    branch: main
    dockerfilePath: deploy/migrate/Dockerfile
    schedule: ""  # Manual trigger only
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: deploysentry-db
          property: connectionString

# Redis
  - type: redis
    name: deploysentry-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru