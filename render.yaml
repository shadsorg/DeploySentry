# DeploySentry Development Blueprint
# Uses existing Crowdsoft Postgres (crowdsoft-all-dev) and Redis (crowdsoft-redis-dev)
# Region: Ohio

services:
  # -----------------------------------------------------------------------
  # API Server (Go)
  # -----------------------------------------------------------------------
  - type: web
    name: deploysentry-api
    runtime: go
    plan: starter
    region: ohio
    repo: https://github.com/shadsorg/DeploySentry.git
    branch: main
    buildCommand: go build -ldflags "-s -w" -o bin/api ./cmd/api
    startCommand: bin/api
    healthCheckPath: /health
    envVars:
      - key: DS_SERVER_HOST
        value: 0.0.0.0
      - key: DS_SERVER_PORT
        value: "8080"
      # Existing Postgres: crowdsoft-all-dev (dpg-d6is3hea2pns73aqj1c0-a)
      - key: DS_DATABASE_HOST
        fromDatabase:
          name: crowdsoft-all-dev
          property: host
      - key: DS_DATABASE_PORT
        fromDatabase:
          name: crowdsoft-all-dev
          property: port
      - key: DS_DATABASE_USER
        fromDatabase:
          name: crowdsoft-all-dev
          property: user
      - key: DS_DATABASE_PASSWORD
        fromDatabase:
          name: crowdsoft-all-dev
          property: password
      - key: DS_DATABASE_NAME
        fromDatabase:
          name: crowdsoft-all-dev
          property: database
      - key: DS_DATABASE_SSL_MODE
        value: require
      - key: DS_DATABASE_SCHEMA
        value: deploy
      # Existing Redis: crowdsoft-redis-dev (red-d6kfq4vtskes73amsl5g)
      - key: DS_REDIS_HOST
        fromService:
          name: crowdsoft-redis-dev
          type: redis
          property: host
      - key: DS_REDIS_PORT
        fromService:
          name: crowdsoft-redis-dev
          type: redis
          property: port
      # NATS (internal service)
      - key: DS_NATS_URL
        fromService:
          name: deploysentry-nats
          type: pserv
          envVarKey: NATS_URL
      - key: DS_AUTH_JWT_SECRET
        generateValue: true
      - key: DS_LOG_LEVEL
        value: info

  # -----------------------------------------------------------------------
  # Web Dashboard (React Static Site)
  # -----------------------------------------------------------------------
  - type: web
    name: deploysentry-web
    runtime: static
    repo: https://github.com/shadsorg/DeploySentry.git
    branch: main
    buildCommand: cd web && npm ci && npm run build
    staticPublishPath: web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: deploysentry-api
          type: web
          property: host

  # -----------------------------------------------------------------------
  # NATS (Private Service)
  # -----------------------------------------------------------------------
  - type: pserv
    name: deploysentry-nats
    runtime: docker
    plan: starter
    region: ohio
    repo: https://github.com/shadsorg/DeploySentry.git
    branch: main
    dockerfilePath: deploy/nats/Dockerfile
    disk:
      name: nats-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NATS_URL
        value: nats://localhost:4222